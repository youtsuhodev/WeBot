# Échoue si des fichiers typiques de secrets sont suivis par Git (ex. .env forcé avec git add -f).
name: Garde secrets dépôt

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  no-tracked-env-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aucun fichier .env (hors .env.example) ne doit être versionné
        run: |
          set -euo pipefail
          bad="$(git ls-files | grep -E '^\.env' | grep -Ev '^\.env\.example$' || true)"
          if [ -n "$bad" ]; then
            echo "::error::Des fichiers d'environnement sont suivis par Git. Retire-les de l'index et ajoute-les au .gitignore."
            echo "$bad"
            exit 1
          fi
