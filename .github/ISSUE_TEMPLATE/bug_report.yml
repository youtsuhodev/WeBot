name: Rapport de bug
description: Signaler un comportement incorrect ou inattendu
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de décrire le problème. Vérifie qu’aucune issue ouverte ne traite déjà du même sujet.

  - type: textarea
    id: summary
    attributes:
      label: Résumé
      description: En une ou deux phrases, que se passe-t-il ?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Liste les actions qui mènent au bug.
      placeholder: "1. …\n2. …\n3. …"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement observé
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environnement (si pertinent)
      description: Ex. version du bot, OS, hébergeur.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: J’ai lu le Code de conduite du dépôt
          required: true
